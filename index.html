<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CoachHub — High Performance Coaching Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --cream:#F0F6FF; --warm-white:#F8FBFF; --forest:#0B2545; --forest-light:#13375e;
  --sage:#4A90C4; --gold:#C8A97E; --gold-light:#EDE0CF; --charcoal:#0D1B2A;
  --muted:#7A8FA6; --border:#D1E3F5; --card:#FFFFFF; --red:#C0392B;
  --red-light:#FDECEA; --green:#1A8C6E; --green-light:#E6F7F3;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--cream);font-family:'Outfit',sans-serif;color:var(--charcoal);min-height:100vh;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.15);opacity:.8}}
@keyframes wave{0%,100%{height:8px}50%{height:24px}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .4s ease forwards;}
.fade-in{animation:fadeIn .3s ease forwards;}

/* Layout */
.app{display:flex;min-height:100vh;}
.sidebar{width:260px;min-height:100vh;background:linear-gradient(175deg,#0B2545 0%,#0d2e56 60%,#1565A0 100%);display:flex;flex-direction:column;padding:32px 24px;position:fixed;left:0;top:0;bottom:0;z-index:100;box-shadow:4px 0 24px rgba(11,37,69,0.15);}
.main{margin-left:260px;flex:1;padding:40px 48px;max-width:1200px;}

/* Logo */
.logo{display:flex;align-items:center;gap:10px;margin-bottom:48px;}
.logo-mark{width:36px;height:36px;background:linear-gradient(135deg,var(--gold),#e8c9a0);border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(200,169,126,0.4);}
.logo-mark svg{width:18px;height:18px;fill:#0B2545;}
.logo-text{font-family:'Cormorant Garamond',serif;font-size:22px;color:#fff;font-weight:600;letter-spacing:0.5px;}
.logo-sub{font-size:10px;color:rgba(255,255,255,0.45);letter-spacing:3px;text-transform:uppercase;margin-top:2px;}

/* Nav */
.nav-label{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:8px;padding:0 8px;font-weight:500;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;color:rgba(255,255,255,.7);font-size:14px;transition:all .2s;margin-bottom:2px;}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff;}
.nav-item.active{background:rgba(255,255,255,0.1);color:#fff;border-left:3px solid var(--gold);padding-left:9px;}
.nav-item svg{width:16px;height:16px;flex-shrink:0;}
.nav-badge{margin-left:auto;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.6);font-size:11px;padding:2px 8px;border-radius:20px;}
.sidebar-footer{margin-top:auto;padding-top:24px;border-top:1px solid rgba(255,255,255,.1);}
.coach-badge{display:flex;align-items:center;gap:10px;}
.coach-av{width:36px;height:36px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:var(--forest);}

/* Page */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:36px;}
.page-title{font-family:'Cormorant Garamond',serif;font-size:34px;color:var(--forest);font-weight:600;letter-spacing:-0.3px;}
.page-subtitle{color:var(--muted);font-size:14px;margin-top:4px;}

/* Buttons */
.btn-primary{background:var(--forest);color:#fff;border:none;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .2s;font-family:'Outfit',sans-serif;letter-spacing:0.3px;}
.btn-primary:hover{background:var(--forest-light);transform:translateY(-1px);box-shadow:0 4px 16px rgba(11,37,69,0.3);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none;}
.btn-secondary{background:transparent;color:var(--forest);border:1.5px solid var(--border);padding:10px 20px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:8px;}
.btn-secondary:hover{border-color:var(--forest);background:rgba(44,74,62,.04);}
.btn-danger{background:var(--red);color:#fff;border:none;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .2s;font-family:'Outfit',sans-serif;}
.btn-danger:hover{background:#a93226;}
.btn-ghost{background:none;border:none;cursor:pointer;color:var(--muted);transition:color .2s;font-family:'DM Sans',sans-serif;padding:4px;}
.btn-ghost:hover{color:var(--charcoal);}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:40px;}
.stat-card{background:var(--card);border-radius:14px;padding:24px;border:1px solid var(--border);position:relative;overflow:hidden;}
.stat-card::before{content:'';position:absolute;top:0;right:0;width:80px;height:80px;border-radius:0 14px 0 80px;}
.stat-card.s1::before{background:rgba(21,101,160,0.06);}
.stat-card.s2::before{background:rgba(11,37,69,0.05);}
.stat-card.s3::before{background:rgba(33,150,196,0.08);}
.stat-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.stat-value{font-family:'Cormorant Garamond',serif;font-size:38px;color:var(--forest);font-weight:600;letter-spacing:-0.5px;}
.stat-note{font-size:12px;color:var(--sage);margin-top:4px;}

/* Search */
.search-wrap{position:relative;flex:1;max-width:400px;}
.search-input{width:100%;padding:11px 16px 11px 42px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);font-size:14px;font-family:'DM Sans',sans-serif;color:var(--charcoal);outline:none;transition:border .2s;}
.search-input:focus{border-color:var(--sage);}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);}

/* Client cards */
.clients-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;}
.client-card{background:var(--card);border-radius:16px;padding:24px;border:1px solid var(--border);cursor:pointer;transition:all .25s;animation:fadeUp .4s ease forwards;opacity:0;}
.client-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.08);border-color:var(--sage);}
.client-avatar{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;flex-shrink:0;}
.goal-tag{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:500;margin-right:6px;margin-bottom:6px;background:rgba(21,101,160,0.08);color:var(--ocean,#1565A0);letter-spacing:0.3px;}
.sessions-badge{font-size:11px;font-weight:500;background:rgba(200,169,126,0.15);color:#8a6428;padding:4px 12px;border-radius:20px;letter-spacing:0.3px;}

/* Detail */
.detail-back{display:flex;align-items:center;gap:8px;color:var(--muted);cursor:pointer;font-size:14px;margin-bottom:32px;transition:color .2s;width:fit-content;}
.detail-back:hover{color:var(--forest);}
.detail-hero{background:linear-gradient(135deg,#0B2545 0%,#1565A0 100%);border-radius:20px;padding:32px;margin-bottom:28px;display:flex;align-items:center;gap:24px;}
.detail-avatar{width:72px;height:72px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:600;flex-shrink:0;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.detail-section{background:var(--card);border-radius:16px;padding:24px;border:1px solid var(--border);}
.detail-section.full{grid-column:1/-1;}
.section-title{font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:16px;}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,#4A90C4,#0B2545);border-radius:3px;transition:width .6s;}

/* Notes */
.note-item{padding:16px;background:var(--warm-white);border-radius:12px;border-left:3px solid var(--sage);margin-bottom:10px;box-shadow:0 1px 4px rgba(11,37,69,0.06);}
.note-date{font-size:11px;color:var(--muted);margin-bottom:6px;}
.note-text{font-size:14px;line-height:1.65;}
.add-note-area{display:flex;gap:10px;margin-bottom:16px;}
.add-note-input{flex:1;padding:11px 14px;border-radius:10px;border:1.5px solid var(--border);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;background:var(--card);transition:border .2s;}
.add-note-input:focus{border-color:var(--sage);}

/* Recording */
.recording-section{background:var(--card);border-radius:20px;border:1px solid var(--border);overflow:hidden;}
.recording-header{padding:24px 24px 0;display:flex;justify-content:space-between;align-items:center;}
.recording-stage{padding:40px 24px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;min-height:200px;}
.record-btn-outer{width:90px;height:90px;border-radius:50%;background:rgba(192,57,43,.08);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .25s;}
.record-btn-outer:hover{background:rgba(192,57,43,.15);transform:scale(1.05);}
.record-btn-inner{width:64px;height:64px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(192,57,43,.4);}
.record-btn-inner svg{width:28px;height:28px;fill:#fff;}
.recording-active .record-btn-outer{background:rgba(192,57,43,.15);animation:pulse 2s ease-in-out infinite;}
.rec-indicator{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;color:var(--red);}
.rec-dot{width:8px;height:8px;border-radius:50%;background:var(--red);animation:pulse 1.2s ease-in-out infinite;}
.waveform{display:flex;align-items:center;gap:3px;height:32px;}
.wave-bar{width:4px;background:var(--sage);border-radius:2px;animation:wave 1s ease-in-out infinite;}
.wave-bar:nth-child(1){animation-delay:0s}.wave-bar:nth-child(2){animation-delay:.1s}.wave-bar:nth-child(3){animation-delay:.2s}.wave-bar:nth-child(4){animation-delay:.3s}.wave-bar:nth-child(5){animation-delay:.15s}.wave-bar:nth-child(6){animation-delay:.05s}.wave-bar:nth-child(7){animation-delay:.25s}.wave-bar:nth-child(8){animation-delay:.35s}
.processing-spinner{width:56px;height:56px;border-radius:50%;border:3px solid var(--border);border-top-color:#4A90C4;animation:spin .9s linear infinite;}
.processing-step{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:8px;justify-content:center;}
.processing-step.done{color:var(--green);}
.processing-step.active{color:var(--forest);font-weight:500;}

/* Recordings list */
.recording-item{border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:box-shadow .2s;margin-bottom:12px;}
.recording-item:hover{box-shadow:0 4px 16px rgba(0,0,0,.06);}
.recording-item-header{padding:16px 20px;display:flex;align-items:center;gap:14px;cursor:pointer;background:var(--card);}
.recording-icon{width:38px;height:38px;border-radius:10px;background:rgba(44,74,62,.08);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.recording-panel{padding:0 20px 20px;background:var(--warm-white);border-top:1px solid var(--border);animation:fadeIn .2s ease;}
.panel-tab{padding:7px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;transition:all .2s;}
.panel-tab.active{background:var(--forest);color:#fff;}
.transcript-text{font-size:14px;line-height:1.8;color:#444;background:var(--card);border-radius:10px;padding:16px;border:1px solid var(--border);max-height:280px;overflow-y:auto;}
.summary-block{border-radius:10px;padding:14px 16px;margin-bottom:10px;}
.summary-block.themes{background:rgba(21,101,160,0.05);border-left:3px solid var(--sage);}
.summary-block.breakthroughs{background:rgba(200,169,126,0.08);border-left:3px solid var(--gold);}
.summary-block.actions{background:rgba(39,174,96,.07);border-left:3px solid var(--green);}
.summary-block-title{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:8px;}
.summary-block-content{font-size:14px;line-height:1.65;}
.summary-block-content ul{padding-left:18px;}
.summary-block-content li{margin-bottom:4px;}

/* Mode cards */
.mode-card{border:1.5px solid var(--border);border-radius:14px;padding:20px 16px;cursor:pointer;transition:all .22s;text-align:center;background:var(--card);display:flex;flex-direction:column;align-items:center;gap:10px;}
.mode-card:hover{border-color:var(--sage);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.07);}
.mode-icon{width:60px;height:60px;border-radius:16px;display:flex;align-items:center;justify-content:center;}
.mode-title{font-weight:600;font-size:14px;}
.mode-desc{font-size:12px;color:var(--muted);line-height:1.5;}
.mode-tag{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;}
.mode-back{width:30px;height:30px;border-radius:8px;background:var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:background .2s;flex-shrink:0;}
.mode-back:hover{background:#d0c8bc;}
.upload-zone{border:2px dashed var(--border);border-radius:14px;padding:40px 24px;text-align:center;cursor:pointer;transition:all .2s;background:var(--warm-white);display:flex;flex-direction:column;align-items:center;}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--sage);background:rgba(122,158,142,.05);}
.upload-zone.has-file{border-color:var(--green);background:rgba(39,174,96,.04);cursor:default;}

/* Check-ins */
.checkins-grid{display:grid;grid-template-columns:300px 1fr;gap:24px;align-items:start;}
.client-select-list{background:var(--card);border-radius:16px;border:1px solid var(--border);overflow:hidden;}
.client-select-header{padding:16px 20px;border-bottom:1px solid var(--border);font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);}
.client-select-item{padding:14px 20px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .15s;border-bottom:1px solid var(--border);}
.client-select-item:last-child{border-bottom:none;}
.client-select-item:hover{background:var(--cream);}
.client-select-item.active{background:rgba(44,74,62,.06);border-left:3px solid var(--forest);}
.btn-generate{width:100%;padding:16px;border-radius:12px;background:linear-gradient(135deg,#0B2545 0%,#1565A0 100%);color:#fff;border:none;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .25s;box-shadow:0 4px 16px rgba(11,37,69,0.25);}
.btn-generate:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(11,37,69,0.35);}
.btn-generate:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.checkin-output{background:var(--warm-white);border-radius:12px;border:1px solid var(--border);padding:20px;font-size:14px;line-height:1.85;color:var(--charcoal);white-space:pre-wrap;min-height:160px;}
.typing-cursor::after{content:'|';animation:blink .8s ease-in-out infinite;margin-left:2px;}
.btn-send{flex:1;min-width:140px;padding:12px 16px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;font-family:'DM Sans',sans-serif;border:1.5px solid var(--border);background:var(--card);color:var(--charcoal);}
.btn-send:hover{border-color:var(--forest);background:rgba(44,74,62,.04);}
.btn-send.copied{border-color:var(--green);color:var(--green);background:var(--green-light);}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;animation:fadeIn .2s ease;}
.modal{background:var(--warm-white);border-radius:20px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;padding:36px;animation:slideUp .3s ease;box-shadow:0 24px 60px rgba(0,0,0,.15);}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--forest);}
.modal-close{width:32px;height:32px;border-radius:8px;border:none;background:var(--border);cursor:pointer;font-size:16px;transition:background .2s;}
.modal-close:hover{background:#d0c8bc;}
.form-group{margin-bottom:20px;}
.form-label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;}
.form-input,.form-textarea{width:100%;padding:11px 14px;border-radius:10px;border:1.5px solid var(--border);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--charcoal);background:var(--card);outline:none;transition:border .2s;}
.form-input:focus,.form-textarea:focus{border-color:var(--sage);}
.form-textarea{min-height:100px;resize:vertical;line-height:1.6;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.form-actions{display:flex;gap:12px;justify-content:flex-end;margin-top:28px;}

/* Toast */
.toast{position:fixed;bottom:32px;right:32px;background:linear-gradient(135deg,#0B2545,#1565A0);color:#fff;padding:14px 22px;border-radius:12px;font-size:14px;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:2000;animation:slideUp .3s ease;}

/* Loading screen */
.loading-screen{position:fixed;inset:0;background:linear-gradient(135deg,#0B2545 0%,#1565A0 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:9999;}
.loading-logo{font-family:'Cormorant Garamond',serif;font-size:36px;color:#fff;font-weight:600;}
.loading-sub{font-size:14px;color:var(--sage);letter-spacing:2px;text-transform:uppercase;}
.loading-spinner{width:40px;height:40px;border-radius:50%;border:3px solid rgba(255,255,255,.2);border-top-color:var(--gold);animation:spin .9s linear infinite;}

/* Empty */
.empty-state{text-align:center;padding:80px 40px;}
.empty-icon{font-size:48px;margin-bottom:16px;}
.empty-title{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--forest);margin-bottom:8px;}
.empty-text{color:var(--muted);font-size:15px;max-width:300px;margin:0 auto 24px;line-height:1.6;}

/* Saved indicator */
.saved-dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;margin-right:6px;}

/* Avatar colors */
.av-1{background:#E8D5F5;color:#6B3FA0}.av-2{background:#D5EBF5;color:#1A6B8A}.av-3{background:#F5E8D5;color:#8A5C1A}.av-4{background:#D5F5E3;color:#1A7A45}.av-5{background:#F5D5D5;color:#8A1A1A}.av-6{background:#F5F5D5;color:#6B6B1A}

::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── MOBILE ── */
@media (max-width: 768px) {
  .sidebar { display:none !important; }
  .main { margin-left:0 !important; padding:20px 16px 100px !important; }
  .page-title { font-size:24px !important; }
  .stats-row { grid-template-columns:1fr !important; gap:12px !important; margin-bottom:24px !important; }
  .clients-grid { grid-template-columns:1fr !important; }
  .detail-grid { grid-template-columns:1fr !important; }
  .detail-hero { padding:20px !important; flex-wrap:wrap; gap:14px !important; }
  .checkins-grid { grid-template-columns:1fr !important; }
  .form-row { grid-template-columns:1fr !important; }
  .page-header { flex-direction:column; gap:12px; }
  .mode-title { font-size:12px !important; }
  .mode-desc { display:none !important; }
  .send-options { flex-direction:column; }

  /* Bottom nav bar */
    .bottom-nav {
    display:flex !important;
    position:fixed; bottom:0; left:0; right:0;
    background:var(--forest); z-index:500;
    padding:8px 0 24px;
    box-shadow:0 -4px 20px rgba(0,0,0,0.2);
  }
  .bottom-nav-item {
    flex:1; display:flex; flex-direction:column; align-items:center;
    gap:3px; padding:6px 4px; cursor:pointer;
    color:rgba(255,255,255,0.45); transition:all 0.2s; border:none;
    background:none; font-family:'DM Sans',sans-serif;
  }
  .bottom-nav-item.active { color:#C8A97E; }

// ─── Processing & Result subcomponents ───────────────────────────────────────

function SpeakerAssignView({result, clientName, onConfirm, onDiscard}) {
  const fn = clientName.split(' ')[0];
  // Get a sample line from each speaker
  const lines = result.transcript.split('\n').filter(l => l.trim());
  const speakerSamples = {};
  lines.forEach(l => {
    const match = l.match(/^(Speaker \w+):/i);
    if (match && !speakerSamples[match[1]]) {
      speakerSamples[match[1]] = l.replace(match[0], '').trim().slice(0, 80);
    }
  });
  const speakers = Object.keys(speakerSamples);

  // If only 1 speaker or no speaker labels — skip straight through
  if (speakers.length <= 1) {
    // Relabel what we have as Coach + client
    const fixed = result.transcript
      .replace(/Speaker 0:/g, 'Coach:')
      .replace(/Speaker A:/gi, 'Coach:')
      .replace(/Speaker 1:/g, `${fn}:`)
      .replace(/Speaker B:/gi, `${fn}:`);
    onConfirm({...result, transcript: fixed});
    return null;
  }

  const [coachSpeaker, setCoachSpeaker] = useState(speakers[0]);

  const confirm = () => {
    const clientSpeaker = speakers.find(s => s !== coachSpeaker) || speakers[1];
    let fixed = result.transcript;
    // Relabel — do client first to avoid double-replacement
    fixed = fixed.replace(new RegExp(`^${clientSpeaker}:`, 'gm'), `___CLIENT___:`);
    fixed = fixed.replace(new RegExp(`^${coachSpeaker}:`, 'gm'), `Coach:`);
    fixed = fixed.replace(/^___CLIENT___:/gm, `${fn}:`);
    onConfirm({...result, transcript: fixed});
  };

  return (
    <div style={{padding:'0 24px 24px'}}>
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'16px 0',color:'var(--green)',fontSize:14,fontWeight:500}}>

      </div>
      <div style={{background:'rgba(21,101,160,0.06)',border:'1px solid var(--border)',borderRadius:14,padding:20,marginBottom:20}}>
        <div style={{fontWeight:600,fontSize:15,marginBottom:4,color:'var(--forest)'}}>One quick thing — who's who? 🎙️</div>
        <div style={{fontSize:13,color:'var(--muted)',marginBottom:20,lineHeight:1.6}}>Deepgram detected 2 speakers. Tap the one that sounds like <strong>you</strong> — so we label the transcript correctly.</div>
        {speakers.map(spk => (
          <div
            key={spk}
            onClick={() => setCoachSpeaker(spk)}
            style={{
              padding:'14px 16px', borderRadius:12, marginBottom:10, cursor:'pointer',
              border:`2px solid ${coachSpeaker===spk ? 'var(--sage)' : 'var(--border)'}`,
              background: coachSpeaker===spk ? 'rgba(21,101,160,0.06)' : 'var(--card)',
              transition:'all 0.2s'

            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6}}>
              <div style={{width:28,height:28,borderRadius:50,background:coachSpeaker===spk?'var(--sage)':'var(--border)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,color:'#fff',fontWeight:600,flexShrink:0}}>
                {coachSpeaker===spk ? '✓' : spk.replace('Speaker ','')}
              </div>
              <div style={{fontWeight:500,fontSize:13}}>{coachSpeaker===spk ? '👤 This is me (Coach)' : `👤 ${spk}`}</div>
            </div>
            <div style={{fontSize:12,color:'var(--muted)',fontStyle:'italic',paddingLeft:38,lineHeight:1.5}}>
              "{speakerSamples[spk] || 'No sample available'}..."
            </div>
          </div>
        ))}
        <div style={{fontSize:12,color:'var(--muted)',marginTop:8}}>
          The other speaker will be labelled as <strong>{fn}</strong>.
        </div>
      </div>
      <div style={{display:'flex',gap:12}}>
        <button className="btn-primary" onClick={confirm}>Confirm & Continue</button>
        <button className="btn-secondary" onClick={onDiscard}>Discard</button>

  );
}

function ResultView({result, onSave, onDiscard}) {

// ─── Recording Studio ─────────────────────────────────────────────────────────
function RecordingStudio({client, onSave}) {
  const [mode, setMode] = useState(null);
  const [stage, setStage] = useState('idle'); // idle | recording | processing | speakers | done
  const [elapsed, setElapsed] = useState(0);
  const [processingStep, setProcessingStep] = useState(0);
  const [result, setResult] = useState(null);
  const [uploadFile, setUploadFile] = useState(null);
  const [dragOver, setDragOver] = useState(false);
  const timerRef = useRef(null);
  const streamRef = useRef(null);
  const fileRef = useRef(null);

  const reset = () => { setMode(null);setStage('idle');setElapsed(0);setProcessingStep(0);setResult(null);setUploadFile(null); };

  const DEEPGRAM_KEY = '4e0d86eaa32a658c594989b8a46145f8cd50d8af';

  const runProcessing = async (dur, audioBlob) => {
    setStage('processing'); setProcessingStep(1);
    const fn = client.name.split(' ')[0];

    try {
      if (!audioBlob) throw new Error('No audio file received — please try uploading again.');

      // ── Step 1: Send audio directly to Deepgram ──
      // Deepgram accepts the file directly — no separate upload step needed
      const params = new URLSearchParams({
        model: 'nova-2',
        diarize: 'true',          // speaker separation
        punctuate: 'true',
        paragraphs: 'true',
        smart_format: 'true',
      });

      const deepgramRes = await fetch(`https://api.deepgram.com/v1/listen?${params}`, {
        method: 'POST',
        headers: {
          'Authorization': `Token ${DEEPGRAM_KEY}`,
          'Content-Type': audioBlob.type || 'audio/mp3',
        },
        body: audioBlob
      });

      if (!deepgramRes.ok) {
        const errText = await deepgramRes.text();
        throw new Error(`Deepgram error (${deepgramRes.status}): ${errText}`);
      }

      setProcessingStep(2);

      const deepgramData = await deepgramRes.json();

      // ── Step 2: Format transcript with speaker labels ──
      let formattedTranscript = '';
      const utterances = deepgramData?.results?.utterances;
      const words = deepgramData?.results?.channels?.[0]?.alternatives?.[0]?.words;

      if (utterances && utterances.length > 0) {
        // Use utterances for clean speaker-separated transcript
        const speakerMap = {};
        let count = 0;
        const labels = ['Coach', fn];
        utterances.forEach(u => {
          const spk = u.speaker;
          if (!(spk in speakerMap)) {
            speakerMap[spk] = labels[count] || `Speaker ${count + 1}`;
            count++;
          }
          formattedTranscript += `${speakerMap[spk]}: ${u.transcript}\n\n`;
        });
      } else if (words && words.length > 0) {
        // Fallback: build from words with speaker info
        const speakerMap = {};
        let count = 0;
        const labels = ['Coach', fn];
        let currentSpeaker = null;
        let currentText = '';
        words.forEach(w => {
          const spk = w.speaker;
          if (!(spk in speakerMap)) {
            speakerMap[spk] = labels[count] || `Speaker ${count + 1}`;
            count++;
          }
          if (spk !== currentSpeaker) {
            if (currentText) formattedTranscript += `${speakerMap[currentSpeaker]}: ${currentText.trim()}\n\n`;
            currentSpeaker = spk;
            currentText = '';
          }
          currentText += w.punctuated_word + ' ';
        });
        if (currentText) formattedTranscript += `${speakerMap[currentSpeaker]}: ${currentText.trim()}\n\n`;
      } else {
        // Plain transcript fallback
        formattedTranscript = deepgramData?.results?.channels?.[0]?.alternatives?.[0]?.transcript || 'Transcript not available';
      }

      const audioDuration = deepgramData?.metadata?.duration
        ? Math.round(deepgramData.metadata.duration)
        : (dur || elapsed);

      setProcessingStep(3);

      // ── Step 3: Generate AI coaching summary via Claude ──
      const summaryPrompt = `You are an expert High Performance Coaching assistant. Carefully analyse this real coaching session transcript.

Client: ${client.name}
Goals: ${client.goals?.join(', ')}
Intention: ${client.intentions}

TRANSCRIPT:
${formattedTranscript.slice(0, 8000)}

Respond ONLY with a JSON object, no markdown, no extra text:
{"themes":["theme 1","theme 2","theme 3"],"breakthroughs":["breakthrough 1","breakthrough 2"],"actions":["action 1","action 2","action 3"]}

Base EVERYTHING only on what was actually said in the transcript above.`;

      let summary = { themes: [], breakthroughs: [], actions: [] };

      try {
        const claudeRes = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 800,
            messages: [{ role: 'user', content: summaryPrompt }]
          })
        });
        const claudeData = await claudeRes.json();
        const raw = claudeData.content?.[0]?.text || '{}';
        summary = JSON.parse(raw.replace(/```json|```/g,'').trim());
      } catch(e) {
        // If Claude summary fails, build basic summary from transcript
        summary = {
          themes: ['Session transcribed — review transcript below for key themes'],
          breakthroughs: ['Read through the transcript to identify breakthrough moments'],
          actions: ['Add your action items based on what was discussed']
        };
      }

      setResult({
        date: new Date().toISOString().split('T')[0],
        duration: audioDuration,
        title: `Session – ${new Date().toLocaleDateString('en-AU',{day:'numeric',month:'short'})}`,
        transcript: formattedTranscript,
        summary,
      });
      setStage('speakers'); // go to speaker assignment first
      setProcessingStep(4);

    } catch(err) {
      console.error('Transcription error:', err);
      setResult({
        date: new Date().toISOString().split('T')[0],
        duration: dur || elapsed,
        title: `Session – ${new Date().toLocaleDateString('en-AU',{day:'numeric',month:'short'})}`,
        transcript: `Error: ${err.message}`,
        summary: {
          themes: [`Error: ${err.message}`],
          breakthroughs: ['Screenshot this and send to Claude for fixing'],
          actions: ['Try again with your MP3 file', 'Make sure file is under 25MB']
        }
      });
      setStage('done');
      setProcessingStep(4);
    }
  };

  const chunksRef = useRef([]);

  const startLive = async () => {
    chunksRef.current = [];
    try {
      const s = await navigator.mediaDevices.getUserMedia({audio:true});
      streamRef.current = s;
      const mr = new MediaRecorder(s);
      mediaRef.current = mr;
      mr.ondataavailable = e => { if(e.data.size > 0) chunksRef.current.push(e.data); };
      mr.start(1000);
    } catch(e) { /* mic blocked — will use demo mode */ }
    setStage('recording'); setElapsed(0);
    timerRef.current = setInterval(()=>setElapsed(e=>e+1),1000);
  };

  const stopLive = () => {
    clearInterval(timerRef.current);
    if (streamRef.current) streamRef.current.getTracks().forEach(t=>t.stop());
    if (mediaRef.current && mediaRef.current.state !== 'inactive') {
      mediaRef.current.stop();
      mediaRef.current.onstop = () => {
        const audioBlob = chunksRef.current.length > 0
          ? new Blob(chunksRef.current, {type:'audio/webm'})
          : null;
        runProcessing(elapsed, audioBlob);
      };
    } else {
      runProcessing(elapsed, null);
    }
  };
  const handleFile = f => { if(f) setUploadFile(f); };
  const processUpload = () => { const est = Math.round((uploadFile.size/1000000)*60)||1800; runProcessing(est, uploadFile); };
  const saveSession = () => { onSave({id:Date.now().toString(),...result}); reset(); };
  const confirmSpeakers = (updatedResult) => { setResult(updatedResult); setStage('done'); };
  useEffect(()=>()=>clearInterval(timerRef.current),[]);

  if (!mode) return (
    <div className="recording-section">
      <div className="recording-header"><div><div style={{fontWeight:500,fontSize:15}}>New Session Recording</div><div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>Choose how you recorded this session</div></div></div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:16,padding:24}}>
        <div className="mode-card" onClick={()=>setMode('live')}>
          <div className="mode-icon" style={{background:'rgba(192,57,43,.08)'}}><svg viewBox="0 0 24 24" fill="none" stroke="#C0392B" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{width:28,height:28}}><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></div>
          <div className="mode-title">Live Recording</div><div className="mode-desc">Phone on speaker + laptop mic picks it up</div>
          <div className="mode-tag" style={{background:'rgba(192,57,43,.08)',color:'#C0392B'}}>Works right now</div>
        </div>
        <div className="mode-card" onClick={()=>setMode('upload')}>
          <div className="mode-icon" style={{background:'rgba(44,74,62,.08)'}}><svg viewBox="0 0 24 24" fill="none" stroke="#2C4A3E" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{width:28,height:28}}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div>
          <div className="mode-title">Upload Recording</div><div className="mode-desc">From Rev, TapeACall or any iPhone call recorder</div>
          <div className="mode-tag" style={{background:'rgba(44,74,62,.08)',color:'#2C4A3E'}}>iPhone apps</div>
        </div>
        <div className="mode-card" onClick={()=>setMode('zoom')}>
          <div className="mode-icon" style={{background:'rgba(122,158,142,.12)'}}><svg viewBox="0 0 24 24" fill="none" stroke="#7A9E8E" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{width:28,height:28}}><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg></div>
          <div className="mode-title">Zoom / Meet</div><div className="mode-desc">Upload your Zoom cloud or local recording file</div>
          <div className="mode-tag" style={{background:'rgba(122,158,142,.12)',color:'#3d7060'}}>Video calls</div>
        </div>
      </div>
    </div>
  );

  const UploadUI = ({title, tip, emoji}) => (
    <div style={{padding:'0 24px 24px'}}>
      <div style={{background:'rgba(201,168,76,.08)',border:'1px solid rgba(201,168,76,.25)',borderRadius:12,padding:'12px 16px',marginBottom:20,fontSize:13,lineHeight:1.6,color:'#6b5020'}}>{tip}</div>
      <div className={`upload-zone ${dragOver?'drag-over':''} ${uploadFile?'has-file':''}`}
        onClick={()=>!uploadFile&&fileRef.current.click()}
        onDragOver={e=>{e.preventDefault();setDragOver(true)}} onDragLeave={()=>setDragOver(false)}
        onDrop={e=>{e.preventDefault();setDragOver(false);handleFile(e.dataTransfer.files[0]);}}>
        <input ref={fileRef} type="file" accept="audio/*,video/mp4" style={{display:'none'}} onChange={e=>handleFile(e.target.files[0])}/>
        {!uploadFile?(<><div style={{fontSize:36,marginBottom:12}}>{emoji}</div><div style={{fontWeight:500,fontSize:15,marginBottom:4}}>Drop your file here</div><div style={{fontSize:13,color:'var(--muted)'}}>or click to browse · MP3, M4A, MP4, WAV</div></>)
        :(<><div style={{fontSize:36,marginBottom:8}}>✅</div><div style={{fontWeight:500,fontSize:15}}>{uploadFile.name}</div><div style={{fontSize:13,color:'var(--muted)',marginTop:4}}>{(uploadFile.size/1000000).toFixed(1)} MB</div><button className="btn-ghost" onClick={e=>{e.stopPropagation();setUploadFile(null);}} style={{fontSize:12,marginTop:8,color:'var(--red)'}}>Remove</button></>)}
      </div>
      {uploadFile&&<div style={{display:'flex',gap:12,marginTop:16}}><button className="btn-primary" onClick={processUpload}>Transcribe & Summarise</button><button className="btn-secondary" onClick={reset}>Cancel</button></div>}
    </div>
  );

  return (
    <div className="recording-section">
      <div className="recording-header">
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div className="mode-back" onClick={reset}>←</div>
          <div><div style={{fontWeight:500,fontSize:15}}>{mode==='live'?'Live Recording':mode==='upload'?'Upload Recording':'Zoom / Meet'}</div>
          <div style={{fontSize:12,color:'var(--muted)',marginTop:1}}>{mode==='live'?'Put your iPhone on speaker — laptop mic captures both voices':mode==='upload'?'From Rev Call Recorder, TapeACall, or any audio app':'Upload your Zoom or Google Meet recording'}</div></div>
        </div>
        {stage==='done'&&<button className="btn-ghost" onClick={reset} style={{fontSize:13}}>New session</button>}
      </div>

      {mode==='live'&&stage==='idle'&&(<div className="recording-stage"><div className="record-btn-outer" onClick={startLive}><div className="record-btn-inner"><IcMic/></div></div><div style={{textAlign:'center'}}><div style={{fontWeight:500,fontSize:15}}>Tap to Start</div><div style={{fontSize:13,color:'var(--muted)',marginTop:4}}>Keep laptop close to your phone speaker</div></div></div>)}
      {mode==='live'&&stage==='recording'&&(<div className="recording-stage recording-active"><div className="rec-indicator"><div className="rec-dot"/> REC — {fmtDuration(elapsed)}</div><div className="waveform">{[...Array(8)].map((_,i)=><div key={i} className="wave-bar"/>)}</div><button className="btn-danger" onClick={stopLive}><IcStop/> Stop & Process</button></div>)}
      {(mode==='upload'||mode==='zoom')&&stage==='idle'&&<UploadUI emoji={mode==='zoom'?'🎥':'🎙️'} tip={mode==='zoom'?'📁 Find your Zoom recording: Mac → Documents → Zoom → [folder] → .mp4':'📱 iPhone: Open Rev Call Recorder → find recording → Share → AirDrop to Mac → upload here'}/>}
      {stage==='processing'&&<ProcessingView step={processingStep}/>}
      {stage==='speakers'&&result&&<SpeakerAssignView result={result} clientName={client.name} onConfirm={confirmSpeakers} onDiscard={reset}/>}
      {stage==='done'&&result&&<ResultView result={result} onSave={saveSession} onDiscard={reset}/>}
    </div>
  );
}

// ─── Check-ins Page ───────────────────────────────────────────────────────────
function CheckinsPage({clients, onMarkSent}) {
  const [selId,setSelId]=useState(clients[0]?.id||null);
  const [generating,setGenerating]=useState(false);
  const [checkin,setCheckin]=useState(null);
  const [displayedText,setDisplayedText]=useState('');
  const [isTyping,setIsTyping]=useState(false);
  const [copiedEmail,setCopiedEmail]=useState(false);
  const [copiedSms,setCopiedSms]=useState(false);
  const [sendMode,setSendMode]=useState('email');
  const typingRef=useRef(null);
  const sel=clients.find(c=>c.id===selId);

  const buildCheckin = async (c) => {
    const fn = c.name.split(' ')[0];
    const quote = QUOTES[Math.floor(Math.random() * QUOTES.length)];
    const lastRecording = c.recordings?.[0];
    const goal = c.goals?.[0] || 'your journey';

    // Pull real data from the most recent session
    const breakthroughs = lastRecording?.summary?.breakthroughs || [];
    const actions = lastRecording?.summary?.actions || [];
    const themes = lastRecording?.summary?.themes || [];
    const transcript = lastRecording?.transcript || '';
    const sessionDate = lastRecording?.date ? new Date(lastRecording.date).toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long'}) : 'our last session';

    // Extract a meaningful client quote from transcript — filter out filler/logistics
    let clientQuote = '';
    if (transcript) {
      const fillerWords = ['yeah', 'yep', 'okay', 'ok', 'sure', 'great', 'good', 'right', 'hmm', 'um', 'uh', 'so', 'eight', 'eleven', 'time', 'schedule', 'session', 'week', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'call', 'speak'];
      const lines = transcript.split('\n').filter(l => {
        const text = l.replace(/^[^:]+:/, '').trim().toLowerCase();
        if (!l.startsWith(fn + ':')) return false;
        if (text.length < 60) return false; // too short to be meaningful
        const fillerCount = fillerWords.filter(w => text.includes(w)).length;
        if (fillerCount > 3) return false; // too much filler
        // Must contain emotionally meaningful words
        const meaningfulWords = ['feel', 'think', 'believe', 'afraid', 'scared', 'want', 'need', 'real', 'alway', 'never', 'life', 'change', 'hard', 'difficult', 'realise', 'realize', 'understand', 'know', 'different', 'important', 'matter', 'deserve', 'worthy', 'confidence', 'fear', 'hope', 'dream', 'goal', 'struggle', 'trying', 'fail', 'success', 'better', 'worse', 'pattern', 'habit', 'control', 'decision'];
        return meaningfulWords.some(w => text.includes(w));
      });
      if (lines.length > 0) {
        const best = lines[Math.floor(Math.random() * Math.min(lines.length, 3))];
        clientQuote = best.replace(fn + ':', '').trim().slice(0, 150);
      }
    }

    // Build the context summary for Claude to work with
    const sessionContext = `
Client first name: ${fn}
Session date: ${sessionDate}
Goals: ${c.goals?.join(', ')}
Intention: ${c.intentions || 'Not set'}
Key themes from session: ${themes.join('; ')}
Breakthroughs: ${breakthroughs.join('; ')}
Action items client committed to: ${actions.join('; ')}
${clientQuote ? `Direct quote from client during session: "${clientQuote}"` : ''}
Inspiring quote to include: "${quote.text}" — ${quote.author}
    `.trim();

    // Use Claude API to generate a genuinely personalised check-in
    try {
      const prompt = `You are an expert high performance coach writing a warm, personal midweek check-in to a client.

IMPORTANT RULES:
1. NEVER use scheduling talk, logistics, or small talk as a quote or reference (e.g. "yeah no that's great", "let's move the time", "see you next week" are NOT meaningful moments)
2. Only reference emotionally significant moments — realisations, fears, goals, commitments, identity shifts
3. If the breakthroughs or quotes provided are not meaningful (just logistics/filler), DO NOT use them — write warmly from the themes and action items instead
4. A client quote is only worth using if it reveals something about their inner world, fears, goals or growth
5. The message must feel like it came from a coach who deeply LISTENED — not a template

SESSION DATA:
${sessionContext}

HOW TO JUDGE A GOOD QUOTE vs BAD QUOTE:
✅ GOOD: "I realised I've been playing small my whole life"
✅ GOOD: "I'm scared that if I succeed, people will expect more from me"
✅ GOOD: "I don't know if I deserve this"
❌ BAD: "Yeah no that's great"
❌ BAD: "So we'll do an eight to eleven"
❌ BAD: Any scheduling, time, logistics talk

Write TWO versions:

VERSION 1 — EMAIL (warm, personal, 150-200 words):
- Open with their first name and a genuine warm reference to the session
- If there's a meaningful breakthrough — reference it specifically
- If there's a meaningful client quote — weave it in: "When you said '...' that really stayed with me"
- If there are NO meaningful quotes or breakthroughs — skip those sections and write warmly from the themes and goals instead. DO NOT make something up.
- Remind them of their specific committed action item(s)
- Include the inspiring quote naturally
- Close with personalised encouragement tied to their specific journey
- Sign as "Your Coach"

VERSION 2 — WHATSAPP (2-3 sentences, punchy and warm):
- One personal reference to the session theme
- Their key action reminder
- Short motivational close with emoji

Respond ONLY with this exact JSON format, no markdown, no extra text:
{"email":"full email text here with real line breaks as \\n","sms":"whatsapp message here"}`;

      const claudeRes = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1200,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      const claudeData = await claudeRes.json();
      const raw = claudeData.content?.[0]?.text || '{}';
      const parsed = JSON.parse(raw.replace(/```json|```/g, '').trim());
      return { email: parsed.email, sms: parsed.sms, quote, isAI: true };

    } catch(e) {
      // Fallback to template if Claude API unavailable
      const action = actions[0] || `reflecting on ${goal}`;
      const breakthrough = breakthroughs[0] || '';
      const email = `Hi ${fn},\n\nI've been thinking about our session on ${sessionDate} and wanted to check in midweek. 💛\n\n${breakthrough ? `✨ What stayed with me:\n${breakthrough}\n\n` : ''}${clientQuote ? `When you said "${clientQuote}" — that really resonated with me.\n\n` : ''}🎯 Your commitment this week:\n${action}\n\nHow's that going for you?\n\n"${quote.text}"\n— ${quote.author}\n\nYou're doing the work, ${fn}. Keep going.\n\nWarmly,\nYour Coach`;
      const sms = `Hi ${fn} 💛 Midweek check-in! How's "${action.slice(0,60)}..." going? Thinking of you. "${quote.text.slice(0,50)}…" 🌱`;
      return { email, sms, quote, isAI: false };
    }
  };

  const typeText = text => {
    setDisplayedText(''); setIsTyping(true); let i = 0;
    const speed = Math.max(3, Math.floor(2500 / text.length));
    clearInterval(typingRef.current);
    typingRef.current = setInterval(() => {
      i++; setDisplayedText(text.slice(0, i));
      if (i >= text.length) { clearInterval(typingRef.current); setIsTyping(false); }
    }, speed);
  };

  const generate = async () => {
    if (!sel) return;
    setGenerating(true); setCheckin(null); setDisplayedText('');
    try {
      const r = await buildCheckin(sel);
      setCheckin(r);
      setGenerating(false);
      typeText(sendMode === 'email' ? r.email : r.sms);
    } catch(e) {
      setGenerating(false);
    }
  };

  const switchMode = m => { setSendMode(m); if(checkin) typeText(m==='email'?checkin.email:checkin.sms); };
  const copyText = m => {
    const t=m==='email'?checkin.email:checkin.sms;
    navigator.clipboard.writeText(t).catch(()=>{});
    if(m==='email'){setCopiedEmail(true);setTimeout(()=>setCopiedEmail(false),2500);}
    else{setCopiedSms(true);setTimeout(()=>setCopiedSms(false),2500);}
    onMarkSent(selId);
  };

  useEffect(()=>{setCheckin(null);setDisplayedText('');setIsTyping(false);clearInterval(typingRef.current);},[selId]);
  useEffect(()=>()=>clearInterval(typingRef.current),[]);

  return (
    <div className="fade-up">
      <div className="page-header"><div><div className="page-title">Smart Check-ins ✨</div><div className="page-subtitle">AI-drafted from your real session — personalised to what was actually said</div></div></div>
      <div className="checkins-grid">
        <div>
          <div className="client-select-list">
            <div className="client-select-header">Select a client</div>
            {clients.map(c=>(
              <div key={c.id} className={`client-select-item ${selId===c.id?'active':''}`} onClick={()=>setSelId(c.id)}>
                <div className={`client-avatar ${getAvColor(c.name)}`} style={{width:36,height:36,fontSize:13,borderRadius:10,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:600}}>{getInitials(c.name)}</div>
                <div style={{flex:1,minWidth:0}}><div style={{fontSize:14,fontWeight:500}}>{c.name}</div><div style={{fontSize:12,color:'var(--muted)'}}>{c.goals[0]||'High Performance Coaching'}</div></div>
                {c.last_checkin&&<div style={{fontSize:10,background:'var(--green-light)',color:'var(--green)',padding:'2px 8px',borderRadius:20}}>Sent</div>}
              </div>
            ))}
          </div>
          <div style={{background:'rgba(200,169,126,0.08)',border:'1px solid rgba(200,169,126,0.2)',borderRadius:14,padding:16,marginTop:16}}>
            <div style={{fontSize:12,fontWeight:600,color:'#7a5c1e',marginBottom:8,textTransform:'uppercase',letterSpacing:'1px'}}>💡 How it works</div>
            <div style={{fontSize:12,color:'#8a6c30',lineHeight:1.8}}>
              1. Pick a client<br/>
              2. Hit Generate<br/>
              3. Claude reads the <strong>real transcript</strong> from your last session<br/>
              4. Pulls out breakthroughs, actions + actual quotes<br/>
              5. Writes a deeply personal midweek message<br/>
              6. Copy for Email or WhatsApp<br/>
              7. Send — done in 60 seconds!
            </div>
          </div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          {!sel?<div style={{background:'var(--card)',borderRadius:16,border:'1px solid var(--border)',padding:'60px 24px',textAlign:'center',color:'var(--muted)'}}>Select a client to get started</div>:(
            <>
              <div style={{background:'var(--card)',borderRadius:16,border:'1px solid var(--border)',overflow:'hidden'}}>
                <div style={{padding:'16px 20px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:12}}>
                  <div className={`client-avatar ${getAvColor(sel.name)}`} style={{width:36,height:36,fontSize:13,borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:600}}>{getInitials(sel.name)}</div>
                  <div style={{flex:1}}><div style={{fontWeight:500}}>{sel.name}</div><div style={{fontSize:12,color:'var(--muted)'}}>{sel.goals?.join(', ')}</div></div>
                </div>
                {sel.intentions&&<div style={{padding:'14px 20px',fontSize:13,color:'#666',fontStyle:'italic',lineHeight:1.6,borderLeft:'3px solid var(--gold)',margin:'0 20px 16px',background:'var(--cream)',borderRadius:8,marginTop:12}}>"{sel.intentions}"</div>}
              </div>
              {/* Session data source indicator */}
              {sel.recordings?.length > 0 ? (
                <div style={{background:'var(--green-light)',border:'1px solid rgba(26,140,110,0.2)',borderRadius:12,padding:'12px 16px',display:'flex',alignItems:'flex-start',gap:10}}>
                  <span style={{fontSize:18,flexShrink:0}}>🎙️</span>
                  <div>
                    <div style={{fontSize:13,fontWeight:600,color:'var(--green)',marginBottom:2}}>Pulling from real session data</div>
                    <div style={{fontSize:12,color:'#2d7a5e',lineHeight:1.6}}>
                      Last session: <strong>{sel.recordings[0].title}</strong><br/>
                      {sel.recordings[0].summary?.breakthroughs?.[0] && `Breakthrough: "${sel.recordings[0].summary.breakthroughs[0].slice(0,60)}..."`}
                    </div>
                  </div>
                </div>
              ) : (
                <div style={{background:'rgba(200,169,126,0.08)',border:'1px solid rgba(200,169,126,0.2)',borderRadius:12,padding:'12px 16px',display:'flex',alignItems:'flex-start',gap:10}}>
                  <span style={{fontSize:18,flexShrink:0}}>⚠️</span>
                  <div style={{fontSize:12,color:'#8a6c30',lineHeight:1.6}}>
                    <strong>No session recorded yet</strong><br/>
                    Upload a call recording first so the check-in can reference what was actually discussed.
                  </div>
                </div>
              )}

              <button className={`btn-generate`} onClick={generate} disabled={generating}>
                {generating?<><div className="processing-spinner" style={{width:18,height:18,borderWidth:2}}/> Crafting…</>:<><IcSparkle/> Generate Weekly Check-in</>}
              </button>
              {(checkin||generating)&&<div style={{background:'var(--card)',borderRadius:16,border:'1px solid var(--border)',overflow:'hidden'}}>
                <div style={{padding:'16px 20px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <div style={{fontWeight:500,fontSize:14,display:'flex',alignItems:'center',gap:8}}><IcSend/> Your Check-in</div>
                  <div style={{display:'flex',gap:4,background:'var(--cream)',padding:4,borderRadius:8}}>
                    {['email','sms'].map(m=><button key={m} onClick={()=>switchMode(m)} style={{padding:'5px 14px',borderRadius:6,border:'none',cursor:'pointer',fontFamily:'DM Sans,sans-serif',fontSize:12,fontWeight:500,transition:'all .2s',background:sendMode===m?'var(--forest)':'transparent',color:sendMode===m?'#fff':'var(--muted)'}}>{m==='email'?'📧 Email':'💬 WhatsApp'}</button>)}
                  </div>
                </div>
                <div style={{padding:'16px 20px'}}>
                  {generating?<div style={{fontSize:14,color:'var(--muted)',fontStyle:'italic',minHeight:120,display:'flex',alignItems:'center',justifyContent:'center'}}>Crafting a personalised message…</div>
                  :<>
                    <div className={`checkin-output ${isTyping?'typing-cursor':''}`}>{displayedText}</div>
                    {!isTyping&&<>
                      <button className="btn-ghost" onClick={generate} style={{fontSize:12,color:'var(--sage)',marginTop:8}}>↺ Regenerate</button>
                      <div style={{display:'flex',gap:10,marginTop:12}}>
                        <button className={`btn-send ${copiedEmail?'copied':''}`} onClick={()=>copyText('email')}><IcCopy/>{copiedEmail?'✓ Copied!':'Copy Email'}</button>
                        <button className={`btn-send ${copiedSms?'copied':''}`} onClick={()=>copyText('sms')}><IcPhone/>{copiedSms?'✓ Copied!':'Copy for WhatsApp'}</button>
                      </div>
                      <div style={{marginTop:10,fontSize:12,color:'var(--muted)'}}>💡 Paste email into Gmail, or WhatsApp version straight into your chat.</div>
                    </>}
                  </>}
                </div>
              </div>}
              {!checkin&&!generating&&<div style={{background:'var(--card)',borderRadius:16,border:'1px solid var(--border)',padding:'48px 24px',textAlign:'center',color:'var(--muted)'}}>
                <div style={{fontSize:36,marginBottom:12}}>✨</div>
                <div style={{fontSize:14,lineHeight:1.6}}>Hit Generate and your personalised<br/>check-in will appear here.</div>
              </div>}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

      <div style={{marginBottom:12}}>{client.goals?.slice(0,3).map(g=><span key={g} className="goal-tag">{g}</span>)}</div>
      {client.intentions&&<p style={{fontSize:13,color:'#777',lineHeight:1.55,marginBottom:12,fontStyle:'italic',overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}}>"{client.intentions}"</p>}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',paddingTop:16,borderTop:'1px solid var(--border)'}}>
        <div style={{fontSize:12,color:'var(--muted)'}}>{lastNote?`Last note: ${fmtDate(lastNote.created_at)}`:'No notes yet'}</div>

      </div>

  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [loading, setLoading] = useState(true);
  const [clients, setClients] = useState([]);
  const [notes, setNotes] = useState([]);
  const [recordings, setRecordings] = useState([]);
  const [view, setView] = useState('dashboard');
  const [selectedId, setSelectedId] = useState(null);
  const [search, setSearch] = useState('');
  const [showAddClient, setShowAddClient] = useState(false);
  const [newNote, setNewNote] = useState('');
  const [toast, setToast] = useState(null);
  const [form, setForm] = useState({name:'',email:'',phone:'',goals:'',intentions:''});

  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(null),3000); };

  // ── Load all data from Supabase ──
  useEffect(()=>{
    const load = async () => {
      try {
        const [c,n,r] = await Promise.all([
          supabase.from('clients').select('*').order('created_at',{ascending:false}),
          supabase.from('notes').select('*').order('created_at',{ascending:false}),
          supabase.from('recordings').select('*').order('created_at',{ascending:false}),
        ]);
        setClients(c.data||[]);
        setNotes(n.data||[]);
        setRecordings(r.data||[]);
      } catch(e) { console.error(e); }
      setLoading(false);
    };
    load();
  },[]);

  // ── Derived data ──
  const enrichedClients = useMemo(()=>
    clients.map(c=>({
      ...c,
      goals: c.goals||[],
      notes: notes.filter(n=>n.client_id===c.id),
      recordings: recordings.filter(r=>r.client_id===c.id),
    }))
  ,[clients,notes,recordings]);

  const selectedClient = useMemo(()=>enrichedClients.find(c=>c.id===selectedId),[enrichedClients,selectedId]);

  const filtered = useMemo(()=>
    enrichedClients.filter(c=>c.name.toLowerCase().includes(search.toLowerCase()))
  ,[enrichedClients,search]);

  const totalRecordings = recordings.length;
  const avgProgress = clients.length ? Math.round(clients.reduce((a,c)=>a+(c.progress||0),0)/clients.length) : 0;

  // ── CRUD ──
  const addClient = async () => {
    if (!form.name.trim()) return;
    const newC = { name:form.name.trim(), email:form.email, phone:form.phone, start_date:new Date().toISOString().split('T')[0], goals:form.goals.split(',').map(g=>g.trim()).filter(Boolean), intentions:form.intentions, progress:0 };
    const {data,error} = await supabase.from('clients').insert([newC]).select();
    if (!error && data) { setClients(p=>[data[0],...p]); showToast('Client added ✓'); }
    setForm({name:'',email:'',phone:'',goals:'',intentions:''});
    setShowAddClient(false);
  };

  const addNote = async () => {
    if (!newNote.trim()||!selectedId) return;
    const {data,error} = await supabase.from('notes').insert([{client_id:selectedId,text:newNote.trim()}]).select();
    if (!error && data) { setNotes(p=>[data[0],...p]); showToast('Note saved ✓'); }
    setNewNote('');
  };

  const deleteNote = async nid => {
    await supabase.from('notes').delete().eq('id',nid);
    setNotes(p=>p.filter(n=>n.id!==nid));
  };

  const saveRecording = async rec => {
    const {data,error} = await supabase.from('recordings').insert([{client_id:selectedId,title:rec.title,date:rec.date,duration:rec.duration,transcript:rec.transcript,summary:rec.summary}]).select();
    if (!error && data) { setRecordings(p=>[data[0],...p]); showToast('Session saved ✓'); }
  };

  const deleteRecording = async rid => {
    await supabase.from('recordings').delete().eq('id',rid);
    setRecordings(p=>p.filter(r=>r.id!==rid));
  };

  const markCheckinSent = async cid => {
    const today = new Date().toISOString().split('T')[0];
    await supabase.from('clients').update({last_checkin:today}).eq('id',cid);
    setClients(p=>p.map(c=>c.id===cid?{...c,last_checkin:today}:c));
  };

  const openClient = c => { setSelectedId(c.id); setView('detail'); };

  // ── Loading screen ──
  if (loading) return (
    <div className="loading-screen">
      <div style={{fontSize:48,marginBottom:8}}>✦</div>
      <div className="loading-logo">CoachHub</div>
      <div className="loading-sub">Loading your practice</div>
      <div className="loading-spinner"/>
    </div>
  );

  return (
    <div className="app">
      {/* Sidebar */}
      <aside className="sidebar">
        <div className="logo">
          <div className="logo-mark"><svg viewBox="0 0 20 20"><path d="M10 2a8 8 0 100 16A8 8 0 0010 2zm0 14a6 6 0 110-12 6 6 0 010 12zm0-9a1 1 0 011 1v3l2 1a1 1 0 01-1 1.73l-2.5-1.44A1 1 0 019 11V8a1 1 0 011-1z"/></svg></div>
          <div><div className="logo-text">CoachHub</div><div className="logo-sub">High Performance Coaching</div></div>
        </div>
        <div style={{marginBottom:8}}>
          <div className="nav-label">Workspace</div>
          <div className={`nav-item ${view==='dashboard'?'active':''}`} onClick={()=>setView('dashboard')}><IcHome/> Dashboard</div>
          <div className={`nav-item ${view==='clients'||view==='detail'?'active':''}`} onClick={()=>setView('clients')}><IcPeople/> Clients <span className="nav-badge">{clients.length}</span></div>
          <div className={`nav-item ${view==='checkins'?'active':''}`} onClick={()=>setView('checkins')}><IcSend/> Smart Check-ins</div>
          <div className={`nav-item`}><IcMic/> Recordings <span className="nav-badge">{totalRecordings}</span></div>
        </div>
        <div className="sidebar-footer">
          <div className="coach-badge">
            <div className="coach-av">C</div>
            <div><div style={{fontSize:13,color:'#fff',fontWeight:500}}>Coach</div><div style={{fontSize:11,color:'var(--sage)'}}>Life Coach</div></div>
          </div>
        </div>
      </aside>

      <main className="main">
        {/* Mobile header */}
        <div className="mobile-header" style={{display:'none'}}>
          <div className="mobile-logo">✦ CoachHub</div>
          {view==='clients' && <button className="btn-primary" style={{padding:'8px 16px',fontSize:13}} onClick={()=>setShowAddClient(true)}><IcPlus/> Add</button>}
          {view==='detail' && <button className="btn-ghost" style={{fontSize:13,display:'flex',alignItems:'center',gap:6}} onClick={()=>setView('clients')}><IcBack/> Back</button>}
        </div>

        {/* DASHBOARD */}
        {view==='dashboard'&&(
          <div className="fade-up">
            <div className="page-header">
              <div><div className="page-title">Good morning ✨</div><div className="page-subtitle">Here's a snapshot of your practice.</div></div>
            </div>
            <div className="stats-row">
              <div className="stat-card s1"><div className="stat-label">Active Clients</div><div className="stat-value">{clients.length}</div><div className="stat-note">Currently engaged</div></div>
              <div className="stat-card s2"><div className="stat-label">Sessions Recorded</div><div className="stat-value">{totalRecordings}</div><div className="stat-note">With transcript + AI summary</div></div>
              <div className="stat-card s3"><div className="stat-label">Avg Progress</div><div className="stat-value">{avgProgress}%</div><div className="stat-note">Across all clients</div></div>
            </div>
            {clients.length===0?(
              <div className="empty-state">
                <div className="empty-icon">🌱</div>
                <div className="empty-title">Welcome to CoachHub</div>
                <div className="empty-text">Add your first client to get started. Everything saves automatically to your database.</div>
                <button className="btn-primary" style={{margin:'0 auto'}} onClick={()=>setView('clients')}><IcPlus/> Add First Client</button>
              </div>
            ):(
              <>
                <div style={{fontFamily:'Playfair Display,serif',fontSize:22,color:'var(--forest)',marginBottom:4}}>Your Clients</div>
                <div style={{fontSize:14,color:'var(--muted)',marginBottom:24}}>Click any client to open their profile</div>
                <div className="clients-grid">{enrichedClients.slice(0,3).map((c,i)=><ClientCard key={c.id} client={c} index={i} onClick={()=>openClient(c)}/>)}</div>
              </>
            )}
          </div>
        )}

        {/* CLIENTS */}
        {view==='clients'&&(
          <div className="fade-up">
            <div className="page-header">
              <div><div className="page-title">Your Clients</div><div className="page-subtitle">{clients.length} High Performance Coaching client{clients.length!==1?'s':''} · <span className="saved-dot"/>saved to database</div></div>
              <button className="btn-primary" onClick={()=>setShowAddClient(true)}><IcPlus/> Add Client</button>
            </div>
            <div style={{display:'flex',gap:12,marginBottom:32}}>
              <div className="search-wrap"><span className="search-icon"><IcSearch/></span><input className="search-input" placeholder="Search clients..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
            </div>
            {filtered.length===0?(
              <div className="empty-state"><div className="empty-icon">🌱</div><div className="empty-title">No clients yet</div><div className="empty-text">Add your first client to start building their profile.</div><button className="btn-primary" style={{margin:'0 auto'}} onClick={()=>setShowAddClient(true)}><IcPlus/> Add Client</button></div>
            ):(
              <div className="clients-grid">{filtered.map((c,i)=><ClientCard key={c.id} client={c} index={i} onClick={()=>openClient(c)}/>)}</div>
            )}
          </div>
        )}

        {/* CLIENT DETAIL */}
        {view==='detail'&&selectedClient&&(
          <div className="fade-in">
            <div className="detail-back" onClick={()=>setView('clients')}><IcBack/> Back to Clients</div>
            <div className="detail-hero">
              <div className={`detail-avatar ${getAvColor(selectedClient.name)}`}>{getInitials(selectedClient.name)}</div>
              <div style={{flex:1}}>
                <div style={{fontFamily:'Playfair Display,serif',fontSize:28,fontWeight:600,color:'#fff'}}>{selectedClient.name}</div>
                <div style={{fontSize:14,color:'rgba(255,255,255,.6)',marginTop:4}}>Since {fmtDate(selectedClient.start_date)} · {selectedClient.notes.length} notes · {selectedClient.recordings.length} recording{selectedClient.recordings.length!==1?'s':''}</div>
              </div>
              <div style={{textAlign:'right'}}><div style={{fontSize:12,color:'rgba(255,255,255,.5)',marginBottom:4}}>Progress</div><div style={{fontFamily:'Playfair Display,serif',fontSize:28,color:'#E8D5A3'}}>{selectedClient.progress}%</div></div>
            </div>
            <div className="detail-grid">
              <div className="detail-section">
                <div className="section-title">Goals</div>
                {selectedClient.goals.map(g=><span key={g} className="goal-tag">{g}</span>)}
                <div style={{marginTop:12}}>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:'var(--muted)',marginBottom:6}}><span>Journey Progress</span><span>{selectedClient.progress}%</span></div>
                  <div className="progress-bar"><div className="progress-fill" style={{width:`${selectedClient.progress}%`}}/></div>
                </div>
              </div>
              <div className="detail-section">
                <div className="section-title">Intention</div>
                <p style={{fontSize:14,lineHeight:1.7,color:'#555',fontStyle:'italic'}}>"{selectedClient.intentions||'Not set yet.'}"</p>
                {selectedClient.email&&<div style={{marginTop:12,fontSize:13,color:'var(--muted)'}}>📧 {selectedClient.email}</div>}
                {selectedClient.phone&&<div style={{marginTop:4,fontSize:13,color:'var(--muted)'}}>📞 {selectedClient.phone}</div>}
              </div>
              <div className="detail-section full" style={{padding:0,overflow:'hidden'}}>
                <RecordingStudio client={selectedClient} onSave={saveRecording}/>
              </div>
              {selectedClient.recordings.length>0&&(
                <div className="detail-section full">
                  <div className="section-title">Session Recordings ({selectedClient.recordings.length})</div>
                  {selectedClient.recordings.map(r=><RecordingItem key={r.id} rec={r} onDelete={deleteRecording}/>)}
                </div>
              )}
              <div className="detail-section full">
                <div className="section-title">Quick Notes</div>
                <div className="add-note-area">
                  <input className="add-note-input" placeholder="Jot a quick note..." value={newNote} onChange={e=>setNewNote(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addNote()}/>
                  <button className="btn-primary" onClick={addNote}>Add</button>
                </div>
                {selectedClient.notes.length===0?<div style={{textAlign:'center',padding:24,color:'var(--muted)',fontSize:14}}>No notes yet.</div>:
                  selectedClient.notes.map(n=>(
                    <div key={n.id} className="note-item">
                      <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}><div className="note-date">{fmtDate(n.created_at)}</div><button className="btn-ghost" onClick={()=>deleteNote(n.id)}><IcTrash/></button></div>
                      <div className="note-text">{n.text}</div>
                    </div>
                  ))
                }
              </div>
            </div>
          </div>
        )}

        {/* CHECK-INS */}
        {view==='checkins'&&<CheckinsPage clients={enrichedClients} onMarkSent={markCheckinSent}/>}
      </main>

      {/* Add Client Modal */}
      {showAddClient&&(
        <div className="modal-overlay" onClick={()=>setShowAddClient(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-header"><div className="modal-title">Add New Client</div><button className="modal-close" onClick={()=>setShowAddClient(false)}>✕</button></div>
            <div className="form-group"><label className="form-label">Full Name *</label><input className="form-input" placeholder="e.g. Sarah Mitchell" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/></div>
            <div className="form-row">
              <div className="form-group"><label className="form-label">Email</label><input className="form-input" type="email" value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))}/></div>
              <div className="form-group"><label className="form-label">Phone</label><input className="form-input" value={form.phone} onChange={e=>setForm(f=>({...f,phone:e.target.value}))}/></div>
            </div>
            <div className="form-group"><label className="form-label">Goals (comma separated)</label><input className="form-input" placeholder="Career Clarity, Confidence, Purpose" value={form.goals} onChange={e=>setForm(f=>({...f,goals:e.target.value}))}/></div>
            <div className="form-group"><label className="form-label">Client's Intention</label><textarea className="form-textarea" placeholder="What does this client want to achieve?" value={form.intentions} onChange={e=>setForm(f=>({...f,intentions:e.target.value}))}/></div>
            <div className="form-actions"><button className="btn-secondary" onClick={()=>setShowAddClient(false)}>Cancel</button><button className="btn-primary" onClick={addClient}>Add Client</button></div>
          </div>
        </div>
      )}

      {toast&&<div className="toast">✓ {toast}</div>}

      {/* ── BOTTOM NAV (mobile only) ── */}
      <nav className="bottom-nav" style={{display:'none'}}>
        <button className={`bottom-nav-item ${view==='dashboard'?'active':''}`} onClick={()=>setView('dashboard')}>
          <svg viewBox="0 0 20 20" fill="currentColor"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h4a1 1 0 001-1v-3h2v3a1 1 0 001 1h4a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/></svg>
          <span className="bottom-nav-label">Home</span>
        </button>
        <button className={`bottom-nav-item ${view==='clients'||view==='detail'?'active':''}`} onClick={()=>setView('clients')}>
          <svg viewBox="0 0 20 20" fill="currentColor"><path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zm8 0a3 3 0 11-6 0 3 3 0 016 0zM1 14a7 7 0 0114 0H1zm16 0a7 7 0 00-9.33-6.612A9 9 0 0119 14h-2z"/></svg>
          <span className="bottom-nav-label">Clients</span>
        </button>
        <button className={`bottom-nav-item ${view==='checkins'?'active':''}`} onClick={()=>setView('checkins')}>
          <svg viewBox="0 0 20 20" fill="currentColor"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"/></svg>
          <span className="bottom-nav-label">Check-ins</span>
        </button>
        <button className={`bottom-nav-item`} onClick={()=>setShowAddClient(true)}>
          <svg viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M10 5a1 1 0 011 1v3h3a1 1 0 110 2h-3v3a1 1 0 11-2 0v-3H6a1 1 0 110-2h3V6a1 1 0 011-1z"/></svg>
          <span className="bottom-nav-label">Add Client</span>
        </button>
      </nav>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
